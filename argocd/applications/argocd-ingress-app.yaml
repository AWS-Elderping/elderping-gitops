apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-ingress-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/AWS-Elderping/elderping-gitops.git
    targetRevision: HEAD
    path: infrastructure
    directory:
      include: 'argocd-ingress.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
