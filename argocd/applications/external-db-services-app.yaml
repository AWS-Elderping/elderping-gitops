apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-db-services-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: healthcare
  source:
    repoURL: https://github.com/AWS-Elderping/elderping-gitops.git
    targetRevision: HEAD
    path: infrastructure
    directory:
      include: 'external-db-services.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
